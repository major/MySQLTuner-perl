# This is a basic workflow to help you get started with Actions

name: Test with database matrix

permissions:
  contents: read

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  run_mt_with_db:
    name: ${{ matrix.vendor }} ${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - vendor: MySQL
            image: mysql
            version: '5.7'
            health_command: mysqladmin ping -h 127.0.0.1 -uroot -proot
          - vendor: MySQL
            image: mysql
            version: '8.0'
            health_command: mysqladmin ping -h 127.0.0.1 -uroot -proot
          - vendor: MySQL
            image: mysql
            version: '8.4'
            health_command: mysqladmin ping -h 127.0.0.1 -uroot -proot
          - vendor: MySQL
            image: mysql
            version: '9.6'
            health_command: mysqladmin ping -h 127.0.0.1 -uroot -proot
          - vendor: MariaDB
            image: mariadb
            version: '10.6'
            health_command: mariadb-admin ping -h 127.0.0.1 -uroot -proot
          - vendor: MariaDB
            image: mariadb
            version: '10.11'
            health_command: mariadb-admin ping -h 127.0.0.1 -uroot -proot
          - vendor: MariaDB
            image: mariadb
            version: '11.4'
            health_command: mariadb-admin ping -h 127.0.0.1 -uroot -proot
          - vendor: MariaDB
            image: mariadb
            version: '11.8'
            health_command: mariadb-admin ping -h 127.0.0.1 -uroot -proot
          - vendor: MariaDB
            image: mariadb
            version: '12.2'
            health_command: mariadb-admin ping -h 127.0.0.1 -uroot -proot
    runs-on: ubuntu-latest

    services:
      mysql:
        image: ${{ matrix.image }}:${{ matrix.version }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="${{ matrix.health_command }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Setup MySQL Tuner repository
        uses: actions/checkout@v6

      - name: Injecting credentials
        run: |
          echo -e "[client]\nuser=root\npassword=root\nhost=127.0.0.1\nprotocol=TCP" > $HOME/.my.cnf

      - name: Cloning test_db dataset
        run: |
          git clone https://github.com/datacharmer/test_db.git

      - name: Injecting test_db dataset
        run: |
          cd test_db
          mysql -e 'select version();'
          mysql -e 'CREATE DATABASE data;'
          mysql data< ./employees.sql
          cd -
          rm -rf test_db

      # Runs a single command using the runners shell
      - name: Run help mode
        run: |
          set -o pipefail
          perl ./mysqltuner.pl --help 2>&1 | tee output.log
          if grep -E 'Use of uninitialized value' output.log; then
            echo "Zero-Warning Quality Gate Failed: Uninitialized value warnings detected!"
            exit 1
          fi

      # Runs a single command using the runners shell
      - name: Run verbose mode
        run: |
          set -o pipefail
          sudo perl ./mysqltuner.pl --user=root --pass=root --protocol tcp --verbose 2>&1 | tee output.log
          if grep -E 'Use of uninitialized value' output.log; then
            echo "Zero-Warning Quality Gate Failed: Uninitialized value warnings detected!"
            exit 1
          fi
