name: LTS Version Auto-Bumper

on:
  schedule:
    # Run weekly on Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autobump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run LTS auto-bumper utility
        run: |
          perl build/lts_autobump.pl

      - name: Verify updated files compile cleanly
        run: |
          perl -wc mysqltuner.pl
          perl -wc tests/test_vulnerabilities.t

      - name: Check for modifications
        id: git_status
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git_status.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: automatically update supported database LTS versions"
          branch: lts-auto-update
          title: "chore: automatically update supported database LTS versions"
          body: |
            Automated PR generated by the weekly EOL LTS Version Auto-Bumper.
            
            This PR synchronizes the supported LTS version mappings in `validate_mysql_version()` inside `mysqltuner.pl` and test assertions in `tests/test_vulnerabilities.t` with active release cycle metadata retrieved from the `endoflife.date` APIs.
          delete-branch: true
