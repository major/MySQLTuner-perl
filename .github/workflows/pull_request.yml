# This is a basic workflow to help you get started with Actions

name: CI for MySQL Tuner for MySQL 5.7 and 8.0

permissions:
  contents: read

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  test_help:
    strategy:
      matrix:
        MYSQL_VERSION: [5.7, 8.0]
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:${{ matrix.MYSQL_VERSION }}
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Setup MySQL Tuner repository
        uses: actions/checkout@v6

      - name: Injecting credentials
        run: |
          echo -e "[client]\nuser=root\npassword=root\nhost=127.0.0.1\nprotocol=TCP" > $HOME/.my.cnf

      - name: waiting database
        run: |
          sleep 20s

      - name: Run help mode
        run: |
          set -o pipefail
          sudo perl ./mysqltuner.pl --help 2>&1 | tee output.log
          if grep -iE 'use of uninitialized value|warning' output.log; then
            echo "Zero-Warning Quality Gate Failed: Warnings detected in test output!"
            exit 1
          fi

  test_with_empty_db:
    needs: test_help
    strategy:
      matrix:
        MYSQL_VERSION: [5.7, 8.0]
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:${{ matrix.MYSQL_VERSION }}
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Setup MySQL Tuner repository
        uses: actions/checkout@v6

      - name: Injecting credentials
        run: |
          echo -e "[client]\nuser=root\npassword=root\nhost=127.0.0.1\nprotocol=TCP" > $HOME/.my.cnf

      - name: waiting database
        run: |
          sleep 20s

      # Runs a single command using the runners shell
      - name: Run verbose mode
        run: |
          set -o pipefail
          sudo perl ./mysqltuner.pl --user=root --pass=root --protocol tcp --verbose 2>&1 | tee output.log
          if grep -iE 'use of uninitialized value|warning' output.log; then
            echo "Zero-Warning Quality Gate Failed: Warnings detected in test output!"
            exit 1
          fi

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Setup MySQL Tuner repository
        uses: actions/checkout@v6

      - name: Run unit tests
        run: |
          set -o pipefail
          make unit-tests 2>&1 | tee test_output.log
          if grep -iE 'use of uninitialized value|warning' test_output.log; then
            echo "Zero-Warning Quality Gate Failed: Warnings detected in test output!"
            exit 1
          fi
